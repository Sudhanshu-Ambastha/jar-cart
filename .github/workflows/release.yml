name: Production Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Asset Matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            binary_name: jar-cart.exe
            asset_name: jar-cart-x86_64-windows.zip
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            binary_name: jar-cart
            asset_name: jar-cart-x86_64-linux.tar.gz
          - os: darwin
            arch: amd64
            runner: macos-latest
            binary_name: jar-cart
            asset_name: jar-cart-x86_64-macos.tar.gz

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Windows Binary
        if: matrix.os == 'windows'
        shell: powershell
        run: |
          ./scripts/build.ps1
          ./scripts/package-windows.ps1 `
            -BinaryName "${{ matrix.binary_name }}" `
            -AssetName "${{ matrix.asset_name }}" `
            -CertBase64 "${{ secrets.JC_CERT_BASE64 }}" `
            -CertPassword "${{ secrets.JC_CERT_PASSWORD }}"

      - name: Build POSIX Binary
        if: matrix.os != 'windows'
        run: |
          go build -ldflags="-s -w" -trimpath -o ${{ matrix.binary_name }} ./src
          chmod +x ./scripts/package-posix.sh
          ./scripts/package-posix.sh "${{ matrix.binary_name }}" "${{ matrix.asset_name }}"

      - name: Generate Checksum
        shell: bash
        run: |
          chmod +x ./scripts/package-checksum.sh
          ./scripts/package-checksum.sh "${{ matrix.asset_name }}" "${{ matrix.os }}"

      - name: Staging Artifact Upload
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.os }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Fetch All Staged Assets
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create Production GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          draft: false
          prerelease: false
          generate_release_notes: true

  update-homebrew-tap:
    name: Trigger Homebrew Tap Dispatch
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Fetch Linux Asset Artifact
        uses: actions/download-artifact@v4
        with:
          name: asset-linux
          path: ./dist/linux

      - name: Fetch macOS Asset Artifact
        uses: actions/download-artifact@v4
        with:
          name: asset-darwin
          path: ./dist/macos

      - name: Run Dispatch Script
        run: |
          chmod +x ./scripts/trigger-homebrew-dispatch.sh
          ./scripts/trigger-homebrew-dispatch.sh "${{ github.ref_name }}" "${{ secrets.HOMEBREW_TAP_TOKEN }}"

  update-chocolatey:
    name: Publish to Chocolatey
    needs: publish-release
    runs-on: windows-latest
    steps:
      - name: Checkout Code Repository with Token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Fetch Windows Asset Artifact
        uses: actions/download-artifact@v4
        with:
          name: asset-windows
          path: ./dist/windows

      - name: Extract Version and Checksum
        id: vars
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $sha256 = (Get-Content ./dist/windows/jar-cart-x86_64-windows.zip.sha256).Trim()
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "sha256=$sha256" >> $env:GITHUB_OUTPUT

      - name: Update Metadata Files Locally
        shell: powershell
        run: |
          $version = "${{ steps.vars.outputs.version }}"
          $sha256 = "${{ steps.vars.outputs.sha256 }}"
          $tagRef = "${{ github.ref_name }}"

          ./scripts/update-choco-metadata.ps1 -Version $version -Sha256 $sha256 -TagRef $tagRef

      - name: Commit Metadata Changes to GitHub
        shell: bash
        run: |
          chmod +x ./scripts/git-commit-push.sh
          ./scripts/git-commit-push.sh "." "Update Chocolatey metadata for ${{ github.ref_name }}" "jc/jc.nuspec" "jc/tools/chocolateyinstall.ps1"

      - name: Check Choco, Clean Old Nupkg, Build and Push
        shell: powershell
        run: |
          ./scripts/publish-choco.ps1 `
            -Version "${{ steps.vars.outputs.version }}" `
            -ApiKey "${{ secrets.CHOCOLATEY_API_KEY }}"
